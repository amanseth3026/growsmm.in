<!DOCTYPE html>
<html lang="en">
<head>

  <title>Prize Rewards</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <link rel="stylesheet" href="panel-theme.css">

  <style>
    .prize-hero {
      background: linear-gradient(135deg, #6d28d9 0%, #c026d3 60%, #ec4899 100%);
      color: #fff;
      border-radius: 22px;
      padding: 28px 30px;
      box-shadow: 0 20px 50px rgba(124, 58, 237, 0.28);
      position: relative;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .prize-hero .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .prize-hero h2 {
      font-size: 2rem;
      font-weight: 800;
      margin: 0 0 8px 0;
      line-height: 1.15;
    }

    .prize-hero p {
      margin: 0;
      opacity: 0.92;
      font-size: 0.98rem;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      color: #0f172a;
      margin: 18px 0 12px;
      font-size: 1.08rem;
    }

    .section-title i {
      color: #eab308;
    }

    .reward-grid {
      display: grid;
      gap: 12px;
    }

    .reward-card {
      background: #fff;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
      padding: 14px;
    }

    .reward-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .reward-title {
      margin: 0;
      color: #0f172a;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .reward-status {
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .reward-status.claimable {
      background: #dbeafe;
      color: #1e40af;
    }

    .reward-status.claimed {
      background: #dcfce7;
      color: #166534;
    }

    .reward-status.expired {
      background: #fee2e2;
      color: #b91c1c;
    }

    .reward-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .reward-meta-item {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 8px;
    }

    .reward-meta-lbl {
      color: #64748b;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .reward-meta-val {
      color: #0f172a;
      font-size: 0.86rem;
      font-weight: 700;
      margin-top: 2px;
      word-break: break-word;
      line-height: 1.3;
    }

    .reward-meta-val a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.8rem;
    }

    .reward-note {
      color: #475569;
      font-size: 0.79rem;
      margin: 0 0 10px;
    }

    .btn-claim {
      border: 0;
      border-radius: 10px;
      background: linear-gradient(90deg, #0ea5e9, #2563eb);
      color: #fff;
      font-size: 0.82rem;
      font-weight: 800;
      padding: 9px 12px;
      min-width: 140px;
      box-shadow: 0 10px 16px rgba(37, 99, 235, 0.26);
    }

    .btn-claim[disabled] {
      background: #cbd5e1;
      box-shadow: none;
    }

    .empty-card {
      text-align: center;
      padding: 28px 14px;
      border: 1px dashed rgba(148, 163, 184, 0.4);
      border-radius: 14px;
      background: #f8fafc;
      color: #64748b;
      font-weight: 600;
    }

    @media (max-width: 700px) {
      .prize-hero {
        padding: 22px 18px;
      }

      .prize-hero h2 {
        font-size: 1.45rem;
      }

      .reward-meta {
        grid-template-columns: 1fr;
      }
    }
  </style>

<link rel="stylesheet" href="/styles/modern-chrome.css">

    <section class="prize-hero">
