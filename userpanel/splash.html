<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f6f8fc" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Loading Dashboard</title>

  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="shortcut icon" type="image/png" href="/logo.png">
  <link rel="apple-touch-icon" href="/logo.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <script type="module" src="/site-branding.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    :root {
      --bg: #f6f8fc;
      --surface: rgba(255, 255, 255, 0.9);
      --surface-strong: #ffffff;
      --text: #12315c;
      --muted: #5f6f86;
      --blue: #1d4ed8;
      --blue-dark: #123f8f;
      --orange: #ff7a1a;
      --orange-dark: #f97316;
      --green: #16a34a;
      --shadow: 0 22px 50px rgba(15, 23, 42, 0.12);
      --splash-duration: 2400ms;
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 14%, rgba(29, 78, 216, 0.08) 0 10%, transparent 11%),
        radial-gradient(circle at 88% 18%, rgba(124, 58, 237, 0.07) 0 9%, transparent 10%),
        radial-gradient(circle at 14% 76%, rgba(255, 122, 26, 0.09) 0 9%, transparent 10%),
        radial-gradient(circle at 86% 78%, rgba(22, 163, 74, 0.08) 0 8%, transparent 9%),
        linear-gradient(180deg, #ffffff 0%, #eff4fb 100%);
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(12px);
      opacity: 0.85;
    }

    body::before {
      width: 240px;
      height: 240px;
      left: -72px;
      top: 18%;
      border: 12px solid rgba(29, 78, 216, 0.07);
    }

    body::after {
      width: 260px;
      height: 260px;
      right: -88px;
      bottom: 10%;
      border: 12px solid rgba(255, 122, 26, 0.07);
    }

    .splash-shell {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px 14px 22px;
      isolation: isolate;
    }

    .orb {
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.94) 0%, rgba(255, 255, 255, 0.52) 30%, rgba(255, 255, 255, 0) 70%);
      filter: blur(2px);
      opacity: 0.85;
      animation: drift 8s ease-in-out infinite;
    }

    .orb.a {
      width: 320px;
      height: 320px;
      top: 4%;
      right: -108px;
    }

    .orb.b {
      width: 240px;
      height: 240px;
      left: -86px;
      bottom: 8%;
      animation-delay: 1.4s;
    }

    .orb.c {
      width: 120px;
      height: 120px;
      left: 14%;
      top: 12%;
      background: radial-gradient(circle at center, rgba(255, 122, 26, 0.2) 0%, rgba(255, 122, 26, 0.1) 34%, rgba(255, 122, 26, 0) 72%);
      animation-delay: 2.1s;
    }

    .splash-card {
      position: relative;
      z-index: 1;
      width: min(1100px, 100%);
      display: grid;
      gap: 18px;
      align-items: center;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(240px, 320px) minmax(0, 1fr);
      gap: 22px;
      align-items: center;
    }

    .logo-ring {
      position: relative;
      width: min(300px, 74vw);
      aspect-ratio: 1;
      margin-inline: auto;
      display: grid;
      place-items: center;
    }

    .logo-ring::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(247, 250, 255, 0.8));
      box-shadow: var(--shadow);
    }

    .logo-ring::after {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      border: 10px solid transparent;
      border-top-color: rgba(29, 78, 216, 0.88);
      border-right-color: rgba(29, 78, 216, 0.88);
      border-bottom-color: rgba(255, 122, 26, 0.92);
      border-left-color: rgba(255, 122, 26, 0.92);
      animation: spin 16s linear infinite;
    }

    .logo-core {
      position: absolute;
      inset: 28px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 40%, #ffffff 0 56%, #f5f8fe 100%);
      display: grid;
      place-items: center;
      overflow: hidden;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        0 16px 40px rgba(15, 23, 42, 0.08);
    }

    .logo-core::before,
    .logo-core::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .logo-core::before {
      inset: 8%;
      border: 10px solid rgba(29, 78, 216, 0.08);
    }

    .logo-core::after {
      inset: 24%;
      border: 8px solid rgba(255, 122, 26, 0.09);
    }

    .logo-img {
      position: relative;
      z-index: 1;
      width: min(66%, 220px);
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 16px 20px rgba(18, 49, 92, 0.18));
      animation: bob 5.2s ease-in-out infinite;
    }

    .brand-copy {
      display: grid;
      gap: 12px;
      text-align: center;
    }

    .eyebrow {
      margin: 0;
      color: #475569;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.34em;
      text-transform: uppercase;
    }

    .brand-title {
      margin: 0;
      font-size: clamp(2.25rem, 7vw, 4.5rem);
      line-height: 0.96;
      font-weight: 900;
      letter-spacing: -0.05em;
      color: #173f7d;
      text-shadow: 0 8px 18px rgba(20, 59, 115, 0.06);
    }

    .brand-title span {
      color: var(--orange);
    }

    .domain {
      margin: 0;
      color: #3b4f71;
      font-size: clamp(0.92rem, 1.9vw, 1.05rem);
      font-weight: 700;
      letter-spacing: 0.26em;
      text-transform: uppercase;
    }

    .brand-note {
      margin: 0 auto;
      max-width: 36rem;
      color: var(--muted);
      font-size: clamp(0.92rem, 1.8vw, 1rem);
      line-height: 1.75;
    }

    .loading-card {
      width: min(520px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 10px;
      text-align: center;
      padding: 4px 2px;
    }

    .loading-row {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #21406d;
      font-size: 1rem;
      font-weight: 800;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 3px solid rgba(29, 78, 216, 0.16);
      border-top-color: var(--blue);
      border-right-color: var(--orange);
      animation: spin 0.9s linear infinite;
    }

    .progress-shell {
      height: 20px;
      padding: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.28);
      overflow: hidden;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
    }

    .progress-fill {
      width: 0;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #1f57b7 0%, #7b3fd6 32%, #ff5f2a 68%, #ff8b1f 100%);
      box-shadow: 0 10px 18px rgba(255, 111, 0, 0.25);
      animation: load var(--splash-duration) cubic-bezier(0.2, 0.7, 0.15, 1) forwards;
    }

    .footer-card {
      width: min(920px, 100%);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 20px 22px;
      border-radius: 28px;
      color: #fff;
      background: linear-gradient(135deg, #184f9b 0%, #12396d 100%);
      box-shadow: 0 24px 50px rgba(19, 57, 109, 0.24);
    }

    .footer-copy {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .footer-copy span {
      color: #ff9b2f;
    }

    .footer-copy small {
      display: block;
      margin-top: 4px;
      color: rgba(255, 255, 255, 0.78);
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    .footer-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #fff;
      font-weight: 800;
      white-space: nowrap;
    }

    @keyframes load {
      from { width: 0%; }
      to { width: 88%; }
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes drift {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.55; }
      50% { transform: translateY(-18px) scale(1.1); opacity: 0.95; }
    }

    @media (max-width: 960px) {
      .hero-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .brand-copy {
        gap: 10px;
      }
    }

    @media (max-width: 720px) {
      body {
        overflow: auto;
      }

      .splash-shell {
        padding: 18px 12px 20px;
      }

      .logo-ring {
        width: min(250px, 84vw);
      }

      .logo-core {
        inset: 24px;
      }

      .live-board {
        padding: 15px;
        border-radius: 22px;
      }

      .footer-card {
        flex-direction: column;
        text-align: center;
        border-radius: 22px;
        padding: 18px 16px;
      }

      .footer-badge {
        width: 100%;
        justify-content: center;
      }
    }

    @media (max-width: 480px) {
      .eyebrow {
        letter-spacing: 0.22em;
      }

      .promo-text {
        min-height: 3rem;
      }

      .loading-row {
        font-size: 0.95rem;
      }

      .footer-copy {
        font-size: 0.95rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }

      .progress-fill {
        width: 88%;
      }
    }
  </style>

<link rel="stylesheet" href="/styles/modern-chrome.css">
<script defer src="/scripts/modern-chrome.js"></script>
  <link rel="stylesheet" href="../styles/perf-responsive.css">
  <script src="../scripts/perf-boost.js" defer></script>
</head>
<body>
  <main class="splash-shell">
    <span class="orb a" aria-hidden="true"></span>
    <span class="orb b" aria-hidden="true"></span>
    <span class="orb c" aria-hidden="true"></span>

    <section class="splash-card" aria-label="Launch screen">
      <div class="hero-grid">
        <div class="logo-ring" aria-hidden="true">
          <div class="logo-core">
            <img class="logo-img" src="/logo.png" alt="Panel Logo">
          </div>
        </div>

        <div class="brand-copy">
          <p class="eyebrow">Premium app launch</p>
          <h1 class="brand-title" data-panel-name></h1>
          <p class="domain">growsmm.in</p>
          <p class="brand-note">
            Smart growth, fast delivery, and clean support. Your panel is opening in a premium
            native-app style.
          </p>
        </div>
      </div>

      <section class="loading-card" aria-label="Loading progress">
        <div class="loading-row">
          <span class="spinner" aria-hidden="true"></span>
          <span id="loadingLabel">Opening your dashboard...</span>
        </div>
        <div class="progress-shell" aria-hidden="true">
          <div class="progress-fill"></div>
        </div>
      </section>

      <footer class="footer-card">
        <div>
          <p class="footer-copy">Made by <span>Aman Seth</span></p>
          <small>www.growsmm.in</small>
        </div>
      </footer>
    </section>
  </main>

  <script>
    (function () {
      const splashDuration = 2400;
      document.documentElement.style.setProperty("--splash-duration", `${splashDuration}ms`);

      const loadingLabel = document.getElementById("loadingLabel");

      let storedUser = "";
      try {
        storedUser =
          String(localStorage.getItem("smmGrowthUser") || "").trim() ||
          String(sessionStorage.getItem("smmGrowthUser") || "").trim();
      } catch {
        storedUser = "";
      }

      const targetUrl = storedUser ? "/userpanel/neworder.html" : "/index.html";

      if (loadingLabel) {
        loadingLabel.textContent = storedUser
          ? "Welcome back, loading your dashboard..."
          : "Preparing your dashboard...";
      }

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/sw.js", { updateViaCache: "none" })
          .then((registration) => registration.update().catch(() => {}))
          .catch(() => {});
      }

      window.setTimeout(() => {
        window.location.replace(targetUrl);
      }, splashDuration);
    })();
  </script>
</body>
</html>
