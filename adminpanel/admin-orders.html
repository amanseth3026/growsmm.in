<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin - Orders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin-style.css">
  <style>
    #adminOrdersPaginationWrap {
      display: flex;
      justify-content: center;
    }

    .admin-orders-pagination .page-item + .page-item {
      margin-left: 8px;
    }

    .admin-orders-pagination .page-link {
      min-width: 42px;
      height: 42px;
      border-radius: 8px;
      border: 1px solid #dbe2ea;
      background: #fff;
      color: #64748b;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      line-height: 1;
      box-shadow: none;
    }

    .admin-orders-pagination .page-item.active .page-link {
      background: #2f80ed;
      border-color: #2f80ed;
      color: #fff;
      box-shadow: 0 8px 16px rgba(47, 128, 237, 0.28);
    }

    .admin-orders-pagination .page-item.disabled .page-link {
      color: #c0c7d2;
      border-color: #e5e7eb;
      background: #f8fafc;
    }

    .admin-orders-pagination .page-item.ellipsis .page-link {
      min-width: auto;
      padding: 0 2px;
      border: none;
      background: transparent;
      color: #94a3b8;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="wrapper">
  <div class="sidebar-overlay" id="overlay"></div>

  <div id="sidebar-wrapper">
        <div class="sidebar-heading d-flex justify-content-between align-items-center">
        <div class="panel-brand">
          <span class="panel-name" data-panel-name></span>
          <small class="panel-mobile d-none" data-panel-mobile></small>
        </div>
        <button class="btn btn-sm btn-light d-lg-none" id="sidebarCloseBtn"><i class="bi bi-x-lg"></i></button>
    </div>
        <div class="list-group list-group-flush">
      <a href="admin-dashboard.html" class="list-group-item"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="admin-orders.html" class="list-group-item active"><i class="bi bi-box-seam"></i> Orders</a>
      <a href="admin-users.html" class="list-group-item"><i class="bi bi-people"></i> Users</a>
      <a href="admin-payments.html" class="list-group-item"><i class="bi bi-wallet2"></i> Payments</a>
      <a href="admin-cash-type.html" class="list-group-item"><i class="bi bi-cash-coin"></i> Cash Type</a>
      <a href="admin-categories.html" class="list-group-item"><i class="bi bi-list-ul"></i> Categories</a>
      <a href="admin-services.html" class="list-group-item"><i class="bi bi-gear"></i> Services</a>
      <a href="admin-manual-services.html" class="list-group-item"><i class="bi bi-tools"></i> Manual Services</a>
      <a href="admin-broadcast.html" class="list-group-item"><i class="bi bi-megaphone"></i> Announcements</a>
      <a href="admin-analytics.html" class="list-group-item"><i class="bi bi-bar-chart-line"></i> Analytics</a>
      <a href="admin-settings.html" class="list-group-item"><i class="bi bi-sliders"></i> Settings</a>
      <a href="#" id="btnLogout" class="list-group-item text-danger"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
  </div>

  <div id="page-content-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div class="d-flex align-items-center gap-3">
          <button class="btn btn-primary shadow-sm" id="menu-toggle"><i class="bi bi-list"></i> Menu</button>
          <h4 class="fw-bold m-0">Orders</h4>
      </div>
      <span class="badge bg-primary fs-6" id="totalOrdersCount">Loading...</span>
    </div>

    <div class="card p-3 mb-3 shadow-sm">
        <div class="row g-2">
            <div class="col-md-6">
                <input type="text" id="searchInput" class="form-control" placeholder="Search Order ID, User, or Link...">
            </div>
            <div class="col-md-3">
                <select id="statusFilter" class="form-select">
                    <option value="all">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="processing">Processing</option>
                    <option value="in progress">In Progress</option>
                    <option value="completed">Completed</option>
                    <option value="partial">Partial</option>
                    <option value="canceled">Canceled</option>
                </select>
            </div>
            <div class="col-md-3">
                <select id="vendorFilter" class="form-select">
                    <option value="all">All Vendors</option>
                </select>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th width="15%">Link</th>
                        <th width="25%">Service</th>
                        <th>Qty</th>
                        <th>Charge</th>
                        <th>Vendor Cost</th>
                        <th>Start/Rem</th>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody"></tbody>
            </table>
        </div>
        <div id="adminOrdersPaginationWrap" class="card-footer bg-white d-none">
          <nav aria-label="Admin order pages">
            <ul id="adminOrdersPagination" class="admin-orders-pagination pagination pagination-sm mb-0"></ul>
          </nav>
        </div>
    </div>
  </div>
</div>

<div class="modal fade" id="editOrderModal" tabindex="-1">
  <div class="modal-dialog">
    <form class="modal-content" id="editOrderForm">
      <div class="modal-header">
        <h5 class="modal-title">Edit Order</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editDocId">
        <div class="mb-2"><label class="small text-muted">Order ID</label><input id="editOrderId" class="form-control"></div>
        <div class="mb-2"><label class="small text-muted">Status</label>
            <select id="editStatus" class="form-select">
                <option value="pending">Pending</option>
                <option value="processing">Processing</option>
                <option value="in progress">In Progress</option>
                <option value="completed">Completed</option>
                <option value="partial">Partial</option>
                <option value="canceled">Canceled</option>
            </select>
        </div>
        <div class="mb-2"><label class="small text-muted">Quantity</label><input type="number" id="editQty" class="form-control"></div>
        <div class="mb-2"><label class="small text-muted">Start Count</label><input type="number" id="editStartCount" class="form-control"></div>
        <div class="mb-2"><label class="small text-muted">Remains</label><input type="number" id="editRemains" class="form-control"></div>
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-primary-custom w-100">Save Changes</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="admin-orders.js"></script>

<script type="module" src="admin-sync.js"></script>
</body>
</html>
