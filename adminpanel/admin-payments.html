<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin - Payments</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin-style.css">
  <style>
    #adminPaymentsPaginationWrap {
      display: flex;
      justify-content: center;
    }

    .admin-payments-pagination .page-item + .page-item {
      margin-left: 8px;
    }

    .admin-payments-pagination .page-link {
      min-width: 42px;
      height: 42px;
      border-radius: 8px;
      border: 1px solid #dbe2ea;
      background: #fff;
      color: #64748b;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      line-height: 1;
      box-shadow: none;
    }

    .admin-payments-pagination .page-item.active .page-link {
      background: #2f80ed;
      border-color: #2f80ed;
      color: #fff;
      box-shadow: 0 8px 16px rgba(47, 128, 237, 0.28);
    }

    .admin-payments-pagination .page-item.disabled .page-link {
      color: #c0c7d2;
      border-color: #e5e7eb;
      background: #f8fafc;
    }

    .admin-payments-pagination .page-item.ellipsis .page-link {
      min-width: auto;
      padding: 0 2px;
      border: none;
      background: transparent;
      color: #94a3b8;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="wrapper">
  <div class="sidebar-overlay" id="overlay"></div>

  <div id="sidebar-wrapper">
        <div class="sidebar-heading d-flex justify-content-between align-items-center">
        <div class="panel-brand">
          <span class="panel-name" data-panel-name></span>
          <small class="panel-mobile d-none" data-panel-mobile></small>
        </div>
        <button class="btn btn-sm btn-light d-lg-none" id="sidebarCloseBtn"><i class="bi bi-x-lg"></i></button>
    </div>
        <div class="list-group list-group-flush">
      <a href="admin-dashboard.html" class="list-group-item"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="admin-orders.html" class="list-group-item"><i class="bi bi-box-seam"></i> Orders</a>
      <a href="admin-users.html" class="list-group-item"><i class="bi bi-people"></i> Users</a>
      <a href="admin-payments.html" class="list-group-item active"><i class="bi bi-wallet2"></i> Payments</a>
      <a href="admin-cash-type.html" class="list-group-item"><i class="bi bi-cash-coin"></i> Cash Type</a>
      <a href="admin-categories.html" class="list-group-item"><i class="bi bi-list-ul"></i> Categories</a>
      <a href="admin-services.html" class="list-group-item"><i class="bi bi-gear"></i> Services</a>
      <a href="admin-manual-services.html" class="list-group-item"><i class="bi bi-tools"></i> Manual Services</a>
      <a href="admin-broadcast.html" class="list-group-item"><i class="bi bi-megaphone"></i> Announcements</a>
      <a href="admin-analytics.html" class="list-group-item"><i class="bi bi-bar-chart-line"></i> Analytics</a>
      <a href="admin-settings.html" class="list-group-item"><i class="bi bi-sliders"></i> Settings</a>
      <a href="#" id="btnLogout" class="list-group-item text-danger"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
  </div>

  <div id="page-content-wrapper">
    <div class="d-flex align-items-center gap-3 mb-4">
        <button class="btn btn-primary shadow-sm" id="menu-toggle"><i class="bi bi-list"></i> Menu</button>
        <h4 class="fw-bold m-0">Payment Requests</h4>
    </div>

    <ul class="nav nav-pills mb-3" id="pills-tab">
      <li class="nav-item"><button class="nav-link active rounded-pill px-4" data-filter="pending_manual" onclick="filterPay('pending_manual', this)">New Requests</button></li>
      <li class="nav-item ms-2"><button class="nav-link rounded-pill px-4" data-filter="approved" onclick="filterPay('approved', this)">Success History</button></li>
      <li class="nav-item ms-2"><button class="nav-link rounded-pill px-4" data-filter="failed" onclick="filterPay('failed', this)">Failed</button></li>
    </ul>

    <div class="card shadow-sm border-0 mb-3">
      <div class="card-body py-2">
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
          <input id="paymentSearchInput" type="text" class="form-control" placeholder="Search by Date, Username, Amount, Tran/UTR, Method, Status">
        </div>
      </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="bg-light">
                    <tr>
                        <th>Date</th>
                        <th>Username</th>
                        <th>Amount</th>
                        <th>Payer Name</th>
                        <th>Tran / UTR</th>
                        <th>Method</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="payTableBody"></tbody>
            </table>
        </div>
        <div id="adminPaymentsPaginationWrap" class="card-footer bg-white d-none">
          <nav aria-label="Admin payment pages">
            <ul id="adminPaymentsPagination" class="admin-payments-pagination pagination pagination-sm mb-0"></ul>
          </nav>
        </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="admin-payments.js"></script>

<script type="module" src="admin-sync.js"></script>
</body>
</html>
