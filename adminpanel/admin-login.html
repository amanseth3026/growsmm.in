<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login — QuickBoost</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#f4f6f8; }
    .login-card { max-width: 380px; margin: 100px auto; }
  </style>
</head>
<body>

<div class="card login-card shadow p-4">
  <h4 class="mb-3 text-center">🔑 Admin Login</h4>
  <div class="mb-3">
    <input id="adminUser" class="form-control" placeholder="Username">
  </div>
  <div class="mb-3">
    <input id="adminPass" type="password" class="form-control" placeholder="Password">
  </div>
  <button id="btnAdminLogin" class="btn btn-primary w-100">Login</button>
</div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  getDocs,
  query,
  where,
  doc,
  setDoc,
  updateDoc,
  deleteField
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {
  createPasswordRecord,
  hasPasswordRecord,
  verifyPasswordRecord
} from "../password-utils.js";

document.getElementById("btnAdminLogin").addEventListener("click", async () => {
  const username = document.getElementById("adminUser").value.trim();
  const password = document.getElementById("adminPass").value.trim();

  if (!username || !password) {
    alert("⚠️ Enter username and password!");
    return;
  }

  try {
    const adminsRef = collection(db, "admins");
    const snap = await getDocs(adminsRef);

    /* ------------------------------------------------
       🔥 CASE 1: NO ADMIN EXISTS (FIRST TIME SETUP)
    ------------------------------------------------ */
    if (snap.empty) {
      const passwordRecord = await createPasswordRecord(password);
      await setDoc(doc(db, "admins", username), {
        username,
        ...passwordRecord,
        createdAt: Date.now(),
        firstSetup: true
      });

      localStorage.setItem("quickboostAdmin", "true");
      alert("✅ Admin password set successfully!");
      window.location.href = "/adminpanel/admin-orders.html";
      return;
    }

    /* ------------------------------------------------
       🔐 CASE 2: ADMIN EXISTS → LOGIN CHECK
    ------------------------------------------------ */
    const q = query(adminsRef, where("username", "==", username));
    const loginSnap = await getDocs(q);

    if (!loginSnap.empty) {
      const adminDoc = loginSnap.docs[0];
      const adminData = adminDoc.data() || {};
      if (!hasPasswordRecord(adminData)) {
        alert("⚠️ Admin password is not set.");
        return;
      }

      const passwordOk = await verifyPasswordRecord(password, adminData);
      if (!passwordOk) {
        alert("❌ Invalid Username or Password!");
        return;
      }

      if (String(adminData.password || "").trim() && !adminData.passwordHash && !adminData.passwordSalt) {
        const migratedRecord = await createPasswordRecord(adminData.password);
        await updateDoc(adminDoc.ref, {
          ...migratedRecord,
          password: deleteField(),
          passwordMigratedAt: Date.now(),
          updatedAt: Date.now()
        });
      }

      localStorage.setItem("quickboostAdmin", "true");
      alert("✅ Login Successful!");
      window.location.href = "/adminpanel/admin-orders.html";
    } else {
      alert("❌ Invalid Username or Password!");
    }

  } catch (err) {
    console.error(err);
    alert("⚠️ Error during login.");
  }
});
</script>



<script type="module" src="admin-sync.js"></script>
</body>
</html>
