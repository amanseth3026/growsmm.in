<link rel="stylesheet" href="/styles/modern-public.css">

  <script src="../scripts/perf-boost.js" defer></script>

<body class="page-services">
  <nav class="navbar navbar-expand-lg fixed-top" style="position: absolute;" margin-top:5px>
    <div class="container">
        <a class="brand-logo" href="#"><img src="/logo.png" alt="Panel Logo" style="height:40px; padding-right:10px"><span data-panel-name></span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto me-lg-3 mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link login-trigger" href="/index.html"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a></li>
          <li class="nav-item"><a class="nav-link" href="api.html"><i class="bi bi-link-45deg me-1"></i>Api</a></li>
          <li class="nav-item"><a class="nav-link" href="services.html"><i class="bi bi-megaphone me-1"></i>Services</a></li>
          <li class="nav-item"><a class="nav-link" href="signup.html"><i class="bi bi-person-plus-fill me-1"></i>Signup</a></li>
          <li class="nav-item"><a class="nav-link" href="blog.html"><i class="bi bi-newspaper me-1"></i>Blog</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="page-wrap">
    <div class="container">
      <section class="hero-title">
        <p class="mini">Buy Top SMM Services</p>
        <h1>Checkout Our Amazing Services</h1>
      </section>

      <section class="services-shell" aria-label="Service list">
        <div class="services-toolbar" aria-label="Services filters">
          <div class="toolbar-field">
            <label for="servicesSearchInput">Search Service</label>
            <input
              id="servicesSearchInput"
              type="search"
              class="services-search-input"
              placeholder="Search by ID, name, description..."
              autocomplete="off"
            >
          </div>
          <div class="toolbar-field">
            <label for="servicesCategoryBtn">Filter by Category</label>
            <div class="custom-dd-wrapper services-dd-wrapper">
              <button type="button" class="custom-dd-btn services-dd-btn" id="servicesCategoryBtn" aria-expanded="false" aria-haspopup="listbox">
                <span class="dd-btn-copy">
                  <i class="bi bi-grid-fill me-2 text-muted" aria-hidden="true"></i>
                  <span id="servicesCategoryLabel">All Categories</span>
                </span>
                <i class="bi bi-chevron-down small" aria-hidden="true"></i>
              </button>
              <div class="custom-dd-list services-dd-list" id="servicesCategoryList" role="listbox">
                <div id="servicesCategoryItems"></div>
              </div>
              <input type="hidden" id="servicesCategoryFilter" value="all">
            </div>
          </div>
        </div>
        <div class="table-wrap">
          <table class="services-table">
            <thead>
              <tr>
                <th>Service ID</th>
                <th>Service Name</th>
                <th>Price</th>
                <th>Min</th>
                <th>Max</th>
                <th>Description</th>
              </tr>
            </thead>
            <tbody id="servicesTableBody">
              <tr class="empty-row">
                <td colspan="6">Loading services...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <div class="modal fade" id="serviceDescModal" tabindex="-1" aria-labelledby="serviceDescModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="serviceDescModalLabel">Service Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <h6 id="descTitle" class="fw-bold mb-2"></h6>
          <div id="descMeta" class="desc-meta"></div>
          <p id="descText"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/scripts/services.js"></script>
</body>
</html>
